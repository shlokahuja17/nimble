<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: transparent; }

.container { width: 100%; max-width: 680px; margin: 0 auto; padding: 2rem 1rem; }

.header { text-align: center; margin-bottom: 2rem; }
.header h1 { font-size: 32px; font-weight: 500; margin-bottom: 8px; color: var(--color-text-primary); }
.header p { font-size: 14px; color: var(--color-text-secondary); }

.game-wrapper { 
  background: linear-gradient(135deg, var(--color-background-secondary) 0%, var(--color-background-primary) 100%);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}

canvas { 
  display: block; 
  width: 100%; 
  height: auto; 
  background: var(--color-background-primary);
  border-radius: var(--border-radius-md);
  margin-bottom: 1rem;
  border: 0.5px solid var(--color-border-tertiary);
}

.controls {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

button {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  padding: 10px 20px;
  font-size: 14px;
  cursor: pointer;
  color: var(--color-text-primary);
  transition: all 0.2s;
}

button:hover {
  background: var(--color-background-secondary);
  border-color: var(--color-border-primary);
}

button:active {
  transform: scale(0.98);
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 1rem;
}

.stat-card {
  background: var(--color-background-secondary);
  border-radius: var(--border-radius-md);
  padding: 12px;
  text-align: center;
}

.stat-label {
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-bottom: 4px;
}

.stat-value {
  font-size: 20px;
  font-weight: 500;
  color: var(--color-text-primary);
}

.info {
  background: var(--color-background-secondary);
  border-radius: var(--border-radius-md);
  padding: 1rem;
  font-size: 14px;
  line-height: 1.6;
  color: var(--color-text-secondary);
}

.info h3 {
  font-size: 14px;
  font-weight: 500;
  color: var(--color-text-primary);
  margin-bottom: 8px;
}

.info p { margin-bottom: 8px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Nimble</h1>
    <p>A fast-paced reaction game</p>
  </div>

  <div class="game-wrapper">
    <canvas id="gameCanvas" width="600" height="300"></canvas>
    
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Best</div>
        <div class="stat-value" id="best">0</div>
      </div>
    </div>

    <div class="controls">
      <button onclick="startGame()" id="startBtn">Start Game</button>
      <button onclick="togglePause()" id="pauseBtn" disabled>Pause</button>
    </div>
  </div>

  <div class="info">
    <h3>How to play</h3>
    <p><strong>Use arrow keys or WASD</strong> to move your square left and right. Avoid the falling blocks—they'll end your game!</p>
    <p>Catch the golden squares for bonus points. The game gets faster as your score increases.</p>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('score');
const bestDisplay = document.getElementById('best');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');

let gameRunning = false;
let gamePaused = false;
let score = 0;
let bestScore = localStorage.getItem('nimble-best') || 0;
bestDisplay.textContent = bestScore;

const player = {
  x: canvas.width / 2 - 20,
  y: canvas.height - 40,
  width: 40,
  height: 40,
  speed: 6,
  keys: {}
};

let obstacles = [];
let particles = [];
let gameSpeed = 2;

const colors = {
  player: '#3B82F6',
  obstacle: '#EF4444',
  bonus: '#FBBF24',
  bg: '#F3F4F6'
};

function startGame() {
  gameRunning = true;
  gamePaused = false;
  score = 0;
  gameSpeed = 2;
  obstacles = [];
  particles = [];
  player.x = canvas.width / 2 - 20;
  scoreDisplay.textContent = score;
  startBtn.disabled = true;
  pauseBtn.disabled = false;
  update();
}

function togglePause() {
  gamePaused = !gamePaused;
  pauseBtn.textContent = gamePaused ? 'Resume' : 'Pause';
  if (!gamePaused) update();
}

function endGame() {
  gameRunning = false;
  gamePaused = false;
  startBtn.disabled = false;
  pauseBtn.disabled = true;
  pauseBtn.textContent = 'Pause';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('nimble-best', bestScore);
    bestDisplay.textContent = bestScore;
  }
}

document.addEventListener('keydown', (e) => {
  player.keys[e.key.toLowerCase()] = true;
  if (['arrowleft', 'arrowright', 'a', 'd'].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});

document.addEventListener('keyup', (e) => {
  player.keys[e.key.toLowerCase()] = false;
});

function update() {
  if (!gameRunning || gamePaused) return;

  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Move player
  if (player.keys['arrowleft'] || player.keys['a']) {
    player.x = Math.max(0, player.x - player.speed);
  }
  if (player.keys['arrowright'] || player.keys['d']) {
    player.x = Math.min(canvas.width - player.width, player.x + player.speed);
  }

  // Draw player
  ctx.fillStyle = colors.player;
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // Spawn obstacles
  if (Math.random() < 0.02 + gameSpeed * 0.003) {
    const isBonus = Math.random() < 0.15;
    obstacles.push({
      x: Math.random() * (canvas.width - 25),
      y: -25,
      width: 25,
      height: 25,
      speed: 2 + gameSpeed * 0.3,
      isBonus: isBonus
    });
  }

  // Update obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const obs = obstacles[i];
    obs.y += obs.speed;

    // Draw obstacle
    ctx.fillStyle = obs.isBonus ? colors.bonus : colors.obstacle;
    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

    // Check collision
    if (
      player.x < obs.x + obs.width &&
      player.x + player.width > obs.x &&
      player.y < obs.y + obs.height &&
      player.y + player.height > obs.y
    ) {
      if (obs.isBonus) {
        score += 5;
        scoreDisplay.textContent = score;
        createParticles(obs.x + obs.width / 2, obs.y + obs.height / 2, colors.bonus);
      } else {
        endGame();
        return;
      }
      obstacles.splice(i, 1);
    } else if (obs.y > canvas.height) {
      if (!obs.isBonus) score += 1;
      scoreDisplay.textContent = score;
      obstacles.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life--;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;

    ctx.fillStyle = `rgba(255, 255, 255, ${p.life / 100})`;
    ctx.fillRect(p.x, p.y, 4, 4);

    if (p.life <= 0) particles.splice(i, 1);
  }

  gameSpeed = 2 + score * 0.05;
  requestAnimationFrame(update);
}

function createParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * 3,
      vy: Math.sin(angle) * 3,
      life: 100
    });
  }
}
</script>

</body>
</html>
